<script>
    function togglePix() {
        let area = document.getElementById("pixArea");
        area.style.display = (area.style.display === "none") ? "block" : "none";

        if (area.style.display === "none") {
            fecharPix();
        }
    }

function gerarQrPix() {
    let campoInput = document.getElementById("valorPix");
    let valorInput = campoInput.value.replace(",", ".");
    let valor = parseFloat(valorInput);

    if (isNaN(valor) || valor <= 0) {
        alert("Por favor, insira um valor válido.");
        return;
    }

    fetch("pix_qrcode_valor.php?valor=" + valor)
        .then(response => response.json())
        .then(data => {
            if (data.erro) {
                alert(data.mensagem);
                return;
            }
            
            // 1. Atualiza a imagem com o QR Code gerado
            const qrImg = document.getElementById("qrImagem");
            qrImg.src = data.qr_base64;
            
            // 2. Exibe a área do resultado
            document.getElementById("resultadoPix").style.display = "block";
            document.getElementById("valorExibido").innerText = "Valor: R$ " + valor.toFixed(2);

            // 3. LIMPA O INPUT (O que você solicitou)
            campoInput.value = ""; 
            
            // Opcional: Remove o foco do campo para esconder o teclado no telemóvel
            campoInput.blur();
        })
        .catch(err => {
            console.error("Erro ao gerar Pix:", err);
            alert("Erro técnico ao gerar o QR Code.");
        });
}

    function fecharPix() {
        document.getElementById("resultadoPix").style.display = "none";
    }
</script>
