<script>
    function togglePix() {
        let area = document.getElementById("pixArea");
        area.style.display = (area.style.display === "none") ? "block" : "none";

        if (area.style.display === "none") {
            fecharPix();
        }
    }

    function gerarQrPix() {
        // let valor = document.getElementById("valorPix").value;
        let valor = document.getElementById("valorPix").value.replace(",", ".");

        if (!valor || isNaN(valor) || parseFloat(valor) <= 0) {
            alert("Informe um valor válido maior que zero.");
            return;
        }

        fetch("pix_qrcode_valor.php?valor=" + valor)
            .then(response => response.json())
            .then(data => {

                document.getElementById("valorExibido").innerHTML =
                    "Valor: R$ " + parseFloat(valor).toFixed(2);

                document.getElementById("qrImagem").src = data.qr;

                document.getElementById("resultadoPix").style.display = "block";

                document.getElementById("valorPix").value = "";
            })
            .catch(error => {
                console.error("Erro:", error);
                alert("Erro ao gerar QR Code");
            });
    }

    function fecharPix() {
        document.getElementById("resultadoPix").style.display = "none";
    }
</script>

<body>

<div class="container">
