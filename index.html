    function togglePix() {
        let area = document.getElementById("pixArea");

// Função para calcular o CRC16 (Padrão Pix)
function calcularCRC16(payload) {
    let crc = 0xFFFF;
    const polinomio = 0x1021;

    for (let i = 0; i < payload.length; i++) {
        crc ^= (payload.charCodeAt(i) << 8);
        for (let j = 0; j < 8; j++) {
            if ((crc & 0x8000) !== 0) {
                crc = (crc << 1) ^ polinomio;
            } else {
                crc <<= 1;
            }
        }
    }
    return (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, '0');
}

// Função de Sanitização (Substitui o iconv do PHP)
function limparString(str) {
    return str.normalize('NFD')
              .replace(/[\u0300-\u036f]/g, "") // Remove acentos
              .replace(/[^a-zA-Z0-9 ]/g, "")    // Remove símbolos
              .toUpperCase();
}

function gerarQrPix() {
    const campoInput = document.getElementById("valorPix");
    let valorRaw = campoInput.value.replace(",", "."); // Aceita vírgula ou ponto
    let valor = parseFloat(valorRaw);

    if (isNaN(valor) || valor <= 0) {
        alert("Por favor, insira um valor válido.");
        return;
    }

    // Configurações do Recebedor
    const chave = "5521978352349";
    const nome = limparString("Lucia Zani").substring(0, 25);
    const cidade = limparString("Rio de Janeiro").substring(0, 15);
    const valorFormatado = valor.toFixed(2);

    // Montagem do Payload Pix (EMV)
    const merchantAccount = "0014BR.GOV.BCB.PIX01" + chave.length.toString().padStart(2, '0') + chave;
    
    let payload = "000201";
    payload += "26" + merchantAccount.length.toString().padStart(2, '0') + merchantAccount;
    payload += "520400005303986";
    payload += "54" + valorFormatado.length.toString().padStart(2, '0') + valorFormatado;
    payload += "5802BR";
    payload += "59" + nome.length.toString().padStart(2, '0') + nome;
    payload += "60" + cidade.length.toString().padStart(2, '0') + cidade;
    payload += "62070503***6304";

    const payloadCompleto = payload + calcularCRC16(payload);

    // Geração do QR Code no ecrã
    const containerQr = document.getElementById("qrcode");
    containerQr.innerHTML = ""; // Limpa geração anterior
    
    new QRCode(containerQr, {
        text: payloadCompleto,
        width: 200,
        height: 200,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.L
    });

    // Exibe o resultado e limpa o input
    document.getElementById("resultadoPix").style.display = "block";
    document.getElementById("valorExibido").innerText = "Valor: R$ " + valorFormatado;
    
    campoInput.value = ""; // Limpa o campo
    campoInput.blur();     // Fecha o teclado no telemóvel
}

    function fecharPix() {
        document.getElementById("resultadoPix").style.display = "none";
    }
</script>
