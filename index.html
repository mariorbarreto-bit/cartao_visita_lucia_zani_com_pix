<body>

    <div class="container">

    <h2>Pagamento PIX</h2>

        <img src="cartao_Lucia_Zani_terapeuta_outro.png" alt="Cartão de Visita">

        
        <!-- BOTÃO PIX -->

        <div class="pix-input-group">

            <button type="button" class="gerar" onclick="gerarQrPix()">Gerar QR Code</button>
        </div>

        <div id="m_mensagem" style="display:none;">Por favor, insira um valor válido!</div>

        <div id="resultadoPix" class="overlay-pix" onclick="fecharPixArea()" style="display:none;">
            <!--<div class="modal-content" onclick="event.stopPropagation()">-->
            <div class="modal-content">
                <p id="valorExibido"></p>
                <div id="qrcode"></div>
                <p class="instrucao-fechar">Clique fora ou no QR Code para fechar</p>
